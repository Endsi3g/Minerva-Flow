<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Hors ligne — Minerva Flow</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: #fbf9f3;
    color: #1a1e16;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    text-align: center;
  }
  .card { max-width: 360px; }
  .dot {
    width: 44px; height: 44px; border-radius: 50%;
    background: #167f5b; margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
    color: #fbf9f3; font-size: 20px; font-weight: 700;
  }
  h1 { font-size: 19px; margin: 0 0 8px; }
  p { font-size: 14px; color: #565f52; line-height: 1.55; margin: 0 0 20px; }
  button {
    border: none; border-radius: 10px; background: #167f5b; color: #fbf9f3;
    font-size: 13.5px; font-weight: 600; padding: 10px 18px; cursor: pointer;
  }
  button:active { background: #0e5a40; }
</style>
</head>
<body>
  <div class="card">
    <div class="dot">M</div>
    <h1>Pas de connexion</h1>
    <p>Cette page n'a pas encore été visitée avec une connexion active. Vérifiez votre réseau et réessayez.</p>
    <button onclick="location.reload()">Réessayer</button>
  </div>
</body>
</html>
