name: Check late shifts

# Triggers /api/cron/check-late-shifts every 15 minutes. This lives here
# instead of vercel.json's `crons` because the project is on Vercel's Hobby
# plan, which only allows cron jobs to run once per day — a 15-minute
# interval needs an external trigger. The route itself is unchanged: same
# CRON_SECRET bearer-token gate as every other /api/cron/* route.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call check-late-shifts
        run: |
          curl -sf -X GET "https://minerva-flow.vercel.app/api/cron/check-late-shifts" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
